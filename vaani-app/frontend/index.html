<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaani — Indian Language Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <!-- Header -->
    <div class="header">
      <h1>🎙️ Vaani</h1>
      <p>Speak in your language. Be heard in theirs.</p>
    </div>

    <!-- Language Selection -->
    <div class="lang-row">
      <div class="lang-box">
        <label>I Speak</label>
        <select id="fromLang">
          <option value="te">Telugu</option>
          <option value="ta">Tamil</option>
          <option value="hi">Hindi</option>
          <option value="bn">Bengali</option>
          <option value="kn">Kannada</option>
          <option value="ml">Malayalam</option>
          <option value="mr">Marathi</option>
          <option value="gu">Gujarati</option>
          <option value="pa">Punjabi</option>
          <option value="ur">Urdu</option>
        </select>
      </div>

      <div class="swap-btn" onclick="swapLanguages()">⇄</div>

      <div class="lang-box">
        <label>Translate To</label>
        <select id="toLang">
          <option value="ta">Tamil</option>
          <option value="te">Telugu</option>
          <option value="hi">Hindi</option>
          <option value="bn">Bengali</option>
          <option value="kn">Kannada</option>
          <option value="ml">Malayalam</option>
          <option value="mr">Marathi</option>
          <option value="gu">Gujarati</option>
          <option value="pa">Punjabi</option>
          <option value="ur">Urdu</option>
        </select>
      </div>
    </div>

    <!-- Mic Button -->
    <div class="mic-section">
      <button class="mic-btn" id="micBtn" onclick="startListening()">
        🎤
      </button>
      <p id="micStatus">Press mic and speak</p>
    </div>

    <!-- Results -->
    <div class="results">
      <div class="result-box">
        <label>You said:</label>
        <p id="originalText">—</p>
      </div>
      <div class="result-box translated">
        <label>Translation:</label>
        <p id="translatedText">—</p>
        <button class="play-btn" id="playBtn" onclick="playAudio()" style="display:none">
          ▶ Play Translation
        </button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
