<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaani Chat — Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Minimal base so test page matches app look ────────────── */
    :root {
      --bg:#09090f; --bg2:#0e0e1a; --bg3:#13131f;
      --card:rgba(255,255,255,0.03);
      --card-border:rgba(255,255,255,0.07);
      --accent:#7c3aed; --accent-light:#a78bfa;
      --accent-border:rgba(167,139,250,0.18);
      --text:#e2e2f0; --text2:#888899; --text3:#44445a;
      --nav-h:50px;
    }
    [data-theme="light"] {
      --bg:#f4f4fc; --bg2:#ffffff; --bg3:#ededf8;
      --card:rgba(255,255,255,0.8); --card-border:rgba(0,0,0,0.08);
      --text:#0e0e1a; --text2:#5a5a72; --text3:#b0b0c8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Test toolbar ──────────────────────────────────────────── */
    .test-bar {
      height: var(--nav-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }
    .test-bar h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent-light);
      flex: 1;
    }
    .test-bar .tb-badge {
      font-size: 10px;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .test-bar button {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 12px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
    }
    .test-bar button:hover {
      background: var(--accent-subtle, rgba(167,139,250,0.08));
      border-color: var(--accent-border);
      color: var(--accent-light);
    }

    /* ── Chat container fills remaining height ─────────────────── */
    #vaaniChat {
      flex: 1;
      overflow: hidden;
    }
  </style>

  <!-- Link to the isolated chat CSS -->
  <link rel="stylesheet" href="chat-isolated.css">
</head>
<body>

<!-- Test toolbar -->
<div class="test-bar">
  <h1>Vaani Chat — Isolated Test</h1>
  <span class="tb-badge">PHASE 2 TEST</span>
  <button onclick="toggleTheme()">Toggle theme</button>
  <button onclick="openInNewTab()">Open 2nd tab →</button>
</div>

<!-- Chat UI lives here -->
<div id="vaaniChat"></div>

<!-- ── Firebase Compat SDK ─────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- ── Vaani chat module ──────────────────────────────────────── -->
<script src="chat.js"></script>

<script>
  /* Immediately open the chat — no auth needed for this test */
  window.addEventListener("DOMContentLoaded", function () {
    window.vaaniChat.open();
  });

  function toggleTheme() {
    var t = document.documentElement.getAttribute("data-theme");
    document.documentElement.setAttribute("data-theme", t === "dark" ? "light" : "dark");
  }

  function openInNewTab() {
    window.open(location.href, "_blank");
  }

  /* Minimal stubs so chat.js doesn't throw if it looks for app globals */
  window._vaaniCurrentUser = null;
  window.VAANI_AUTH_READY  = true;
</script>
</body>
</html>
