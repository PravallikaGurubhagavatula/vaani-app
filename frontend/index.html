
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaani — Indian Language Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <!-- Header -->
    <div class="header">
      <h1>🎙 Vaani</h1>
      <p>Speak in your language. Be heard in theirs.</p>

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button id="singleModeBtn" class="mode-btn active" onclick="switchMode('single')">Single Mode</button>
        <button id="convModeBtn" class="mode-btn" onclick="switchMode('conversation')">Conversation Mode</button>
      </div>
    </div>

    <!-- ── SINGLE MODE ── -->
    <div id="singleMode">
      <div class="lang-row">
        <div class="lang-box">
          <label>I Speak</label>
          <select id="fromLang">
            <option value="te">Telugu</option>
            <option value="ta">Tamil</option>
            <option value="hi">Hindi</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="mr">Marathi</option>
            <option value="bn">Bengali</option>
            <option value="gu">Gujarati</option>
            <option value="pa">Punjabi</option>
            <option value="ur">Urdu</option>
            <option value="en">English</option>
          </select>
        </div>

        <button class="swap-btn" onclick="swapLanguages()">⇄</button>

        <div class="lang-box">
          <label>Translate To</label>
          <select id="toLang">
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="mr">Marathi</option>
            <option value="bn">Bengali</option>
            <option value="gu">Gujarati</option>
            <option value="pa">Punjabi</option>
            <option value="ur">Urdu</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <button class="mic-btn" id="micBtn" onclick="startListening()">🎤</button>
      <p class="mic-status" id="micStatus">Press mic and speak</p>

      <div class="result-box">
        <span class="result-label">You said:</span>
        <p id="originalText">—</p>
      </div>

      <div class="result-box translation-box">
        <span class="result-label">Translation:</span>
        <p id="translatedText">—</p>
        <button class="play-btn" id="playBtn" onclick="playAudio()" style="display:none">▶ Play Translation</button>
      </div>
    </div>

    <!-- ── CONVERSATION MODE ── -->
    <div id="convMode" style="display:none">
      <div class="conv-container">

        <!-- Person A -->
        <div class="conv-side side-a">
          <div class="conv-header">
            <span class="person-label">Person A</span>
            <select id="convLangA" class="conv-select">
              <option value="te">Telugu</option>
              <option value="ta">Tamil</option>
              <option value="hi">Hindi</option>
              <option value="kn">Kannada</option>
              <option value="ml">Malayalam</option>
              <option value="mr">Marathi</option>
              <option value="bn">Bengali</option>
              <option value="gu">Gujarati</option>
              <option value="pa">Punjabi</option>
              <option value="ur">Urdu</option>
              <option value="en">English</option>
            </select>
          </div>

          <button class="mic-btn mic-a" id="micBtnA" onclick="startConvListening('A')">🎤</button>
          <p class="mic-status" id="micStatusA">Press mic and speak</p>

          <div class="result-box">
            <span class="result-label">Said:</span>
            <p id="originalTextA">—</p>
          </div>
          <div class="result-box translation-box">
            <span class="result-label">Translation:</span>
            <p id="translatedTextA">—</p>
            <button class="play-btn" id="playBtnA" onclick="playAudioA()" style="display:none">▶ Play</button>
          </div>
        </div>

        <!-- Divider -->
        <div class="conv-divider"></div>

        <!-- Person B -->
        <div class="conv-side side-b">
          <div class="conv-header">
            <span class="person-label">Person B</span>
            <select id="convLangB" class="conv-select">
              <option value="ta">Tamil</option>
              <option value="te">Telugu</option>
              <option value="hi">Hindi</option>
              <option value="kn">Kannada</option>
              <option value="ml">Malayalam</option>
              <option value="mr">Marathi</option>
              <option value="bn">Bengali</option>
              <option value="gu">Gujarati</option>
              <option value="pa">Punjabi</option>
              <option value="ur">Urdu</option>
              <option value="en">English</option>
            </select>
          </div>

          <button class="mic-btn mic-b" id="micBtnB" onclick="startConvListening('B')">🎤</button>
          <p class="mic-status" id="micStatusB">Press mic and speak</p>

          <div class="result-box">
            <span class="result-label">Said:</span>
            <p id="originalTextB">—</p>
          </div>
          <div class="result-box translation-box">
            <span class="result-label">Translation:</span>
            <p id="translatedTextB">—</p>
            <button class="play-btn" id="playBtnB" onclick="playAudioB()" style="display:none">▶ Play</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
